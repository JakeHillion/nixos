# WireGuard Client Configuration Example
# This configuration shows how to connect to the hangman.pop WireGuard server
#
# Usage:
# 1. Generate a WireGuard keypair:
#    wg genkey | tee privatekey | wg pubkey > publickey
# 2. Replace YOUR_PRIVATE_KEY_HERE with the contents of privatekey
# 3. Replace ??? in the Endpoint with the actual last octet of the server IP
# 4. Save this file (e.g., as wg0.conf)
# 5. Start the connection: wg-quick up wg0.conf

[Interface]
# Client IP address on the VPN
Address = 10.188.151.2/32

# Client's private key (generate with: wg genkey)
PrivateKey = YOUR_PRIVATE_KEY_HERE

# DNS servers to use when connected
# 10.188.151.1 is the validating resolver (unbound) on the VPN server
# Fallback to public DNS if needed
DNS = 10.188.151.1, 1.1.1.1, 8.8.8.8

[Peer]
# Server's public key (generated automatically by NixOS)
# You can retrieve this by running on the server:
# sudo cat /data/wireguard/wg0-private | wg pubkey
PublicKey = uVJDwDjyRf9mF4hTY99qax8WHpKHr931g3sAmvNYUXY=

# Server endpoint (IP:port)
Endpoint = 149.28.155.156:21372

# Route all traffic through the VPN (0.0.0.0/0)
# Change this to 0.0.0.0/1, 128.0.0.0/1 if you want split tunneling
AllowedIPs = 0.0.0.0/0

# Keep the connection alive (helps with NAT)
PersistentKeepalive = 25
